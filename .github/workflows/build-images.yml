name: Build And Publish Images

on:
  push:
    branches:
      - main
    tags:
      - 'v*'
    paths:
      - '.github/workflows/build-images.yml'
      - 'fair_online/**'
      - 'fair_online_service/**'
      - 'docker-compose.yml'
      - '.env.example'
  pull_request:
    paths:
      - '.github/workflows/build-images.yml'
      - 'fair_online/**'
      - 'fair_online_service/**'
      - 'docker-compose.yml'
      - '.env.example'
  workflow_dispatch:

permissions:
  contents: read
  packages: write

env:
  REGISTRY: ghcr.io

concurrency:
  group: build-images-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - image_name: fair-online-web
            context: ./fair_online
            dockerfile: ./fair_online/Dockerfile
          - image_name: fair-online-service
            context: ./fair_online_service
            dockerfile: ./fair_online_service/Dockerfile

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ github.repository_owner }}/${{ matrix.image_name }}
          tags: |
            type=ref,event=branch
            type=ref,event=pr
            type=ref,event=tag
            type=sha
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: ${{ matrix.context }}
          file: ${{ matrix.dockerfile }}
          platforms: linux/amd64
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Job summary
        run: |
          {
            echo "## Image"
            echo "- name: \`${{ env.REGISTRY }}/${{ github.repository_owner }}/${{ matrix.image_name }}\`"
            echo "- context: \`${{ matrix.context }}\`"
            echo "- dockerfile: \`${{ matrix.dockerfile }}\`"
            echo
            echo "## Tags"
            echo '```text'
            echo "${{ steps.meta.outputs.tags }}"
            echo '```'
          } >> "$GITHUB_STEP_SUMMARY"
